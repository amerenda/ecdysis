name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  IMAGE: amerenda/ecdysis
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: node:20-alpine
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

  build-and-deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t "${IMAGE}:frontend-${TAG}" -t "${IMAGE}:frontend-latest" .
          docker push "${IMAGE}:frontend-${TAG}"
          docker push "${IMAGE}:frontend-latest"

      - name: Raise PR to gitops
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREFIX: ${{ steps.tag.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/ecdysis-frontend-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|amerenda/ecdysis:frontend-[^ ]*|amerenda/ecdysis:frontend-${TAG}|g" \
            apps/ecdysis/deployment-frontend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis frontend ${TAG}"
          git push origin "${BRANCH}"

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "{
              \"title\": \"${PREFIX}: ecdysis frontend ${TAG}\",
              \"body\": \"Auto-generated by ecdysis CI.\\n\\nImage: \`amerenda/ecdysis:frontend-${TAG}\`\\nSource: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"
