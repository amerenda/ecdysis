name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  build-and-deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push frontend
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t "amerenda/ecdysis-frontend:${TAG}" -t "amerenda/ecdysis-frontend:latest" .
          docker push "amerenda/ecdysis-frontend:${TAG}"
          docker push "amerenda/ecdysis-frontend:latest"

      - name: Build and push backend
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t "amerenda/ecdysis-backend:${TAG}" -t "amerenda/ecdysis-backend:latest" -f backend/Dockerfile backend
          docker push "amerenda/ecdysis-backend:${TAG}"
          docker push "amerenda/ecdysis-backend:latest"

      - name: Raise PR to gitops
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREFIX: ${{ steps.tag.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/ecdysis-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|image: amerenda/ecdysis-frontend:[^ ]*|image: amerenda/ecdysis-frontend:${TAG}|g" \
            apps/ecdysis/frontend/deployment-frontend.yaml
          sed -i "s|image: amerenda/ecdysis-backend:[^ ]*|image: amerenda/ecdysis-backend:${TAG}|g" \
            apps/ecdysis/ecdysis-backend/deployment.yaml

          git config user.name "claude-automation"
          git config user.email "claude-automation@amerenda.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis ${TAG}"
          git push origin "${BRANCH}"

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "{
              \"title\": \"${PREFIX}: ecdysis ${TAG}\",
              \"body\": \"Auto-generated by ecdysis CI.\\n\\nImages:\\n- \`amerenda/ecdysis-frontend:${TAG}\`\\n- \`amerenda/ecdysis-backend:${TAG}\`\\n\\nSource: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"


  notify-failure:
    if: failure()
    needs: [test, build-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue for build failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI failed: ${{ github.workflow }}" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure" || echo "Could not create issue"
