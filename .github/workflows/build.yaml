name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  IMAGE: amerenda/ecdysis
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: node:20-alpine
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      pr_prefix: ${{ steps.tag.outputs.pr_prefix }}
    container:
      image: amerenda/k3s-runners:kaniko
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          mkdir -p /kaniko/.docker
          echo '{"auths":{"https://index.docker.io/v1/":{"username":"'"${DOCKERHUB_USERNAME}"'","password":"'"${DOCKERHUB_TOKEN}"'"}}}' > /kaniko/.docker/config.json
          /kaniko/executor \
            --context="${GITHUB_WORKSPACE}" \
            --dockerfile=Dockerfile \
            --destination="${IMAGE}:frontend-${TAG}" \
            --destination="${IMAGE}:frontend-latest" \
            --cache=true \
            --cache-repo="${IMAGE}:cache"

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    container:
      image: ubuntu:22.04
      env:
        GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
    steps:
      - name: Install git and curl
        run: apt-get update && apt-get install -y git curl

      - name: Raise PR to gitops
        shell: bash
        env:
          TAG: ${{ needs.build.outputs.tag }}
          PREFIX: ${{ needs.build.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/ecdysis-frontend-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|amerenda/ecdysis:frontend-[^ ]*|amerenda/ecdysis:frontend-${TAG}|g" \
            apps/ecdysis/deployment-frontend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis frontend ${TAG}"
          git push origin "${BRANCH}"

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "{
              \"title\": \"${PREFIX}: ecdysis frontend ${TAG}\",
              \"body\": \"Auto-generated by ecdysis CI.\\n\\nImage: \`amerenda/ecdysis:frontend-${TAG}\`\\nSource: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"
