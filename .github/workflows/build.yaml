name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  IMAGE: amerenda/ecdysis
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: node:20-alpine
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      pr_prefix: ${{ steps.tag.outputs.pr_prefix }}
    container:
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
    steps:
      - name: Checkout and set tag
        id: tag
        run: |
          # Clone repo (actions/checkout needs Node.js which Kaniko image lacks)
          git clone --depth 1 https://github.com/${GITHUB_REPOSITORY}.git /workspace
          cd /workspace
          git checkout ${GITHUB_SHA}

          # Set image tag
          if echo "$GITHUB_REF" | grep -q "^refs/tags/release/"; then
            VERSION=$(echo "$GITHUB_REF" | sed 's|refs/tags/release/||')
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p /kaniko/.docker
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json
          /kaniko/executor \
            --context=/workspace \
            --dockerfile=Dockerfile \
            --destination="${IMAGE}:frontend-${TAG}" \
            --destination="${IMAGE}:frontend-latest" \
            --cache=true \
            --cache-repo="${IMAGE}:cache"

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    steps:
      - name: Raise PR to gitops
        env:
          TAG: ${{ needs.build.outputs.tag }}
          PREFIX: ${{ needs.build.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/ecdysis-frontend-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|amerenda/ecdysis:frontend-[^ ]*|amerenda/ecdysis:frontend-${TAG}|g" \
            apps/ecdysis/deployment-frontend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis frontend ${TAG}"
          git push origin "${BRANCH}"

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "{
              \"title\": \"${PREFIX}: ecdysis frontend ${TAG}\",
              \"body\": \"Auto-generated by ecdysis CI.\\n\\nImage: \`amerenda/ecdysis:frontend-${TAG}\`\\nSource: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"
