name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  set-tag:
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      pr_prefix: ${{ steps.tag.outputs.pr_prefix }}
    steps:
      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

  build-amd64:
    needs: [test, set-tag]
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push frontend (amd64)
        run: |
          docker build -t "amerenda/ecdysis-frontend:${{ needs.set-tag.outputs.tag }}-amd64" .
          docker push "amerenda/ecdysis-frontend:${{ needs.set-tag.outputs.tag }}-amd64"

      - name: Build and push backend (amd64)
        run: |
          docker build -t "amerenda/ecdysis-backend:${{ needs.set-tag.outputs.tag }}-amd64" -f backend/Dockerfile backend
          docker push "amerenda/ecdysis-backend:${{ needs.set-tag.outputs.tag }}-amd64"

  build-arm64:
    needs: [test, set-tag]
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push frontend (arm64)
        run: |
          docker build -t "amerenda/ecdysis-frontend:${{ needs.set-tag.outputs.tag }}-arm64" .
          docker push "amerenda/ecdysis-frontend:${{ needs.set-tag.outputs.tag }}-arm64"

      - name: Build and push backend (arm64)
        run: |
          docker build -t "amerenda/ecdysis-backend:${{ needs.set-tag.outputs.tag }}-arm64" -f backend/Dockerfile backend
          docker push "amerenda/ecdysis-backend:${{ needs.set-tag.outputs.tag }}-arm64"

  manifest:
    needs: [set-tag, build-amd64, build-arm64]
    runs-on: arc-runner-set
    steps:
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Create multi-arch manifests
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
        run: |
          for IMAGE in ecdysis-frontend ecdysis-backend; do
            # Tagged manifest
            docker buildx imagetools create -t "amerenda/${IMAGE}:${TAG}" \
              "amerenda/${IMAGE}:${TAG}-amd64" \
              "amerenda/${IMAGE}:${TAG}-arm64"

            # Latest manifest
            docker buildx imagetools create -t "amerenda/${IMAGE}:latest" \
              "amerenda/${IMAGE}:${TAG}-amd64" \
              "amerenda/${IMAGE}:${TAG}-arm64"
          done

  deploy:
    needs: [set-tag, manifest]
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Create deploy PR (UAT + prod)
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
          PREFIX: ${{ needs.set-tag.outputs.pr_prefix }}
        run: |
          rm -rf /tmp/gitops
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          # Close any existing ecdysis deploy PRs to avoid ApplicationSet conflicts
          EXISTING_PRS=$(curl -s \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls?state=open&per_page=100" \
            | python3 -c "
          import json,sys
          for pr in json.load(sys.stdin):
              ref = pr.get('head',{}).get('ref','')
              if ref.startswith('deploy/ecdysis-') or ref.startswith('release/ecdysis-'):
                  print(pr['number'])
          " 2>/dev/null || true)
          for PR_NUM in $EXISTING_PRS; do
            echo "Closing superseded PR #${PR_NUM}"
            curl -s -X PATCH \
              -H "Authorization: token ${GITOPS_PAT}" \
              "https://api.github.com/repos/${GITOPS_REPO}/pulls/${PR_NUM}" \
              -d '{"state":"closed"}' > /dev/null
          done

          BRANCH="${PREFIX}/ecdysis-${TAG}"
          git checkout -b "${BRANCH}"

          # Update both UAT and prod manifests on the same branch
          sed -i "s|image: amerenda/ecdysis-frontend:[^ ]*|image: amerenda/ecdysis-frontend:${TAG}|g" \
            apps/ecdysis/frontend-uat/deployment.yaml \
            apps/ecdysis/frontend/deployment-frontend.yaml
          sed -i "s|image: amerenda/ecdysis-backend:[^ ]*|image: amerenda/ecdysis-backend:${TAG}|g" \
            apps/ecdysis/ecdysis-backend-uat/deployment.yaml \
            apps/ecdysis/ecdysis-backend/deployment.yaml

          git config user.name "amerenda-deploy-bot[bot]"
          git config user.email "3192609+amerenda-deploy-bot[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis ${TAG}"
          git push origin "${BRANCH}"

          # Get source commit message for the PR body
          COMMIT_MSG=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%s' 2>/dev/null || echo "")
          COMMIT_BODY=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%b' 2>/dev/null | head -5 || echo "")
          NL=$'\n'
          PR_BODY="**ecdysis ${TAG}**${NL}${NL}${COMMIT_MSG}"
          if [ -n "${COMMIT_BODY}" ]; then
            PR_BODY="${PR_BODY}${NL}${NL}${COMMIT_BODY}"
          fi
          PR_BODY="${PR_BODY}${NL}${NL}Images: \`amerenda/ecdysis-frontend:${TAG}\`, \`amerenda/ecdysis-backend:${TAG}\` (multi-arch: amd64+arm64)${NL}Source: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}"

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "$(jq -n \
              --arg title "${PREFIX}: ecdysis ${TAG}" \
              --arg body "${PR_BODY}" \
              --arg head "${BRANCH}" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}')")

          # Add label so ApplicationSet only creates ecdysis UAT apps
          PR_NUMBER=$(echo "$PR_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['number'])")
          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/issues/${PR_NUMBER}/labels" \
            -d '["deploy:ecdysis"]'

          # Assign Alex so he gets a phone notification
          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/issues/${PR_NUMBER}/assignees" \
            -d '{"assignees":["amerenda"]}'


  notify-failure:
    if: failure()
    needs: [test, build-amd64, build-arm64, manifest, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue for build failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI failed: ${{ github.workflow }}" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure" || echo "Could not create issue"
