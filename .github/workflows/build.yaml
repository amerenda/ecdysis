name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  IMAGE: amerenda/ecdysis
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> $GITHUB_OUTPUT
            echo "pr_prefix=release" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "pr_prefix=deploy" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:frontend-${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:frontend-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Raise PR to gitops
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREFIX: ${{ steps.tag.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/ecdysis-frontend-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|amerenda/ecdysis:frontend-[^ ]*|amerenda/ecdysis:frontend-${TAG}|g" \
            apps/ecdysis/deployment-frontend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis frontend ${TAG}"
          git push origin "${BRANCH}"

          gh pr create \
            --repo ${GITOPS_REPO} \
            --base main \
            --head "${BRANCH}" \
            --title "${PREFIX}: ecdysis frontend ${TAG}" \
            --body "Auto-generated by ecdysis CI.

          Image: \`amerenda/ecdysis:frontend-${TAG}\`
          Source: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}"
