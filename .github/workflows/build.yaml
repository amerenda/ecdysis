name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

env:
  IMAGE: amerenda/ecdysis
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: node:20-alpine
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      pr_prefix: ${{ steps.tag.outputs.pr_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Docker config and context tarball
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Write Docker auth config
          mkdir -p /tmp/kaniko-build
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > /tmp/kaniko-build/config.json

          # Create build context tarball for Kaniko
          tar -cf /tmp/kaniko-build/context.tar -C "${GITHUB_WORKSPACE}" .

          # Write Kaniko args
          cat > /tmp/kaniko-build/args.txt << ARGSEOF
          --dockerfile=Dockerfile
          --destination=${IMAGE}:frontend-${TAG}
          --destination=${IMAGE}:frontend-latest
          --cache=true
          --cache-repo=${IMAGE}:cache
          ARGSEOF

      - name: Build and push with Kaniko
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Run Kaniko as a k8s Job using the workspace PVC
          cat <<JOBEOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kaniko-build-${GITHUB_SHA::7}
            namespace: arc-runners-ecdysis
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 60
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.23.2
                    args:
                      - --context=tar:///workspace/context.tar
                      - --dockerfile=Dockerfile
                      - --destination=${IMAGE}:frontend-${TAG}
                      - --destination=${IMAGE}:frontend-latest
                      - --cache=true
                      - --cache-repo=${IMAGE}:cache
                    volumeMounts:
                      - name: build-data
                        mountPath: /workspace
                      - name: docker-config
                        mountPath: /kaniko/.docker
                volumes:
                  - name: build-data
                    hostPath:
                      path: /tmp/kaniko-build
                  - name: docker-config
                    hostPath:
                      path: /tmp/kaniko-build
          JOBEOF

          # Wait for completion
          kubectl wait --for=condition=complete --timeout=300s \
            job/kaniko-build-${GITHUB_SHA::7} -n arc-runners-ecdysis || {
            echo "=== Kaniko logs ==="
            kubectl logs job/kaniko-build-${GITHUB_SHA::7} -n arc-runners-ecdysis
            kubectl delete job kaniko-build-${GITHUB_SHA::7} -n arc-runners-ecdysis 2>/dev/null
            exit 1
          }

          echo "=== Kaniko logs ==="
          kubectl logs job/kaniko-build-${GITHUB_SHA::7} -n arc-runners-ecdysis
          kubectl delete job kaniko-build-${GITHUB_SHA::7} -n arc-runners-ecdysis 2>/dev/null

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    steps:
      - name: Raise PR to gitops
        env:
          TAG: ${{ needs.build.outputs.tag }}
          PREFIX: ${{ needs.build.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/ecdysis-frontend-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|amerenda/ecdysis:frontend-[^ ]*|amerenda/ecdysis:frontend-${TAG}|g" \
            apps/ecdysis/deployment-frontend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: ecdysis frontend ${TAG}"
          git push origin "${BRANCH}"

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "{
              \"title\": \"${PREFIX}: ecdysis frontend ${TAG}\",
              \"body\": \"Auto-generated by ecdysis CI.\\n\\nImage: \`amerenda/ecdysis:frontend-${TAG}\`\\nSource: https://github.com/amerenda/ecdysis/commit/${GITHUB_SHA}\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"
